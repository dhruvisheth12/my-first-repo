<!DOCTYPE html>
<html>
<body>
    <h2>User List</h2>
    <div id="users"></div>

    <script>
        fetch("https://jsonplaceholder.typicode.com/users")
            .then(response => response.json())
            .then(users => {
                let output = "";

                users.forEach(user => {
                    output += `<p>${user.name} - ${user.email}</p>`;
                });

                document.getElementById("users").innerHTML = output;
            })
            .catch(error => {
                console.log("Error:", error);
            });
    </script>
</body>
</html>
